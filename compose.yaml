services:
  app:
    build: ./auth_proxy
    container_name: media-manager
    ports:
      - "${PORT:-10400}:8000"
    env_file:
      - ./config/.env
    environment:
      - PUBLIC_DIR=/app/public
      - CONFIG_DIR=/app/config
      - DATA_DIR=/app/data
      - PROJECT_DIR=/app/project
    volumes:
      - ./:/app/project
      - ./public:/app/public:ro
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped
